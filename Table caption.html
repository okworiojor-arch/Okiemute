<!DOCTYPE html>

<body>
    <h2>Table Caption</h2>
    <table style="width: 100%;">
        <caption>Monthly savings</caption>
        <tr>
            <th>Month</th>
            <th>savings</th>
        </tr>
        <tr>
            <td>January</td>
            <td>$100</td>
        </tr>
        <tr>
            <td>Feburary</td>
            <td>$50</td>
        </tr>
    </table>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            padding: 5px;
            text-align: left;
        }
    </style>
    </body>
</html>
