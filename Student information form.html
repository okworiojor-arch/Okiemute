<!DOCTYPE html>
<html>
    <body>
        <form>
            <h1>Student Information Form</h1>
    <div>
        <p>
            <input type="text"placeholder="First Name" required>
            <input type="text"placeholder="Last Name" required>
            <input type="text"placeholder="Class" required>
            <input type="text"placeholder="Roll Number">
        </p>
        <p>
            <input type="text"placeholder="Age">
            <input type="text"placeholder="Gender">
            <input type="text"placeholder="Email">
            <input type="tel"placeholder="Phone Number">
        </p>
        
        <p>
            <input type="text"placeholder="Address">
            <input type="text" placeholder="City">
            <input type="text"placeholder="State">
            <input type="text"placeholder="Country">
        </p>

        <p>
            <input type="text"placeholder="Father's Name">
            <input type="text"placeholder="Mother's Name">
            <input type="text"placeholder="Guardian Name">
            <input type="text"placeholder="Emergency Contact">
        </p>

    <p>
            <input type="text"placeholder="Hobbies">
            <input type="text" placeholder="Skills">
            <input type="text"placeholder="Extra Curricular">
            <input type="text" placeholder="Notes" >
    </p>
    </div>
     <button>Submit</button>
        </form>

<style>
     body, html {
                height: 100%;
                width: 100%;
            }

    body {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        width: 100px;
        height: 50px;
        align-items: center;
    }

    input {
        padding:12px;
        border: 1px solid #b5b4b4;
        border-radius: 10px;
        font-size: 10px;
        transition: 0.3s;
        margin-left: 18px;
        width: 200px;
    }
    input:focus {
        border-color: #6a11cb;
        outline: none;
        box-shadow: 0 0 5px #6a11cb;
    }

    form h1{
        text-align: center;
        margin-bottom: 30px;
        color: #333;
    }

    form {
        width: 1000px;
        height: 410px;
        background: rgba(255, 255, 255, 0.95);
        padding: 5px;
        border-radius: 15px;
        box-shadow: 0 20px 200px rgba(0, 0, 0, 0.3);
        margin-left: 100px;
        margin-top: 80px;
    }

    form button {
        width: 980px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        font-size: 25px;
        margin-left: 15px;
        border: none;
    }

</style>

    </body>
</html>
