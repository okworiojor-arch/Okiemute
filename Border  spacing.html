<!DOCTYPE html>
<html>
<h2>Border Table</h2>
<table>
    <tr>
        <th>Firstname</th>
        <th>Lastname</th>
        <th>Age</th>
    </tr>
    <tr>
        <td>Marvelous</td>
        <td>Rose</td>
        <td>18</td>
    </tr>
    <tr>
        <td>Junior</td>
        <td>Louis</td>
        <td>36</td>
    </tr>
    <tr>
        <td>Johson</td>
        <td>David</td>
        <td>11</td>
    </tr>
</table>
<style>
    table, th, td {
        border: 1px solid black;
        padding: 5px;
    }
    table{
        border-spacing: 15px;
    }
</style>
</body>

</html>
